<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Formulário de cadastro com busca de CEP via API ViaCEP e armazenamento no LocalStorage"
    />
    <title>PetPaw - Cadastro de Pets</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">Pet<span>Paw</span> 🐾</div>
    <nav>
      <button class="active" onclick="showSection('cadastro')">Cadastrar</button>
      
    </nav>
  </header>

  <!-- ── MAIN ── -->
  <main>

    <!-- CADASTRO -->
    <div class="section" id="sec-cadastro" style="display:block;">
      <h2 class="section-title">Cadastrar cão</h2>
      <p class="section-sub">Preencha os dados do seu bichinho com carinho 🐶</p>

      <div class="form-card">
        <div class="form-grid">

          <div class="form-group">
            <label>Nome do Pet *</label>
            <input type="text" id="petName" placeholder="Ex: Thor, Bolinha..." />
          </div>

          <div class="form-group">
            <label>Tutor *</label>
            <input type="text" id="ownerName" placeholder="Seu nome" />
          </div>

          <div class="form-group full">
            <label>Raça *</label>
            <div class="breed-selector">
              <select id="breedSelect" onchange="onBreedChange()">
                <option value="">Carregando raças...</option>
              </select>
              <img class="breed-img-preview" id="breedPreview" src="" alt="Raça" />
            </div>
            <div class="breed-info-box" id="breedInfoBox">
              <div class="breed-info-tags" id="breedInfoTags"></div>
            </div>
          </div>

          <div class="form-group">
            <label>Idade</label>
            <input type="number" id="petAge" placeholder="Anos" min="0" max="30" />
          </div>

          <div class="form-group">
            <label>Sexo</label>
            <select id="petGender">
              <option value="">Selecione</option>
              <option>Macho</option>
              <option>Fêmea</option>
            </select>
          </div>

          <div class="form-group">
            <label>Peso (kg)</label>
            <input type="number" id="petWeight" placeholder="Ex: 12" step="0.1" min="0" />
          </div>

          <div class="form-group">
            <label>Cor da pelagem</label>
            <input type="text" id="petColor" placeholder="Ex: Caramelo, Preto..." />
          </div>

          <div class="form-group full">
            <label>Observações</label>
            <textarea id="petNotes" placeholder="Alergias, temperamento, vacinas..."></textarea>
          </div>

        </div>

        <div class="form-actions">
          <button class="submit-button" id="submitButton" onclick="registerPet()">
            Cadastrar Pet 🐾
          </button>
          <button class="clear-button" onclick="clearForm()">
            Limpar ✕
          </button>
        </div>
      </div>

      <!-- LISTA DE PETS CADASTRADOS (abaixo do formulário) -->
      <div class="registered-pets-section">
        <div class="pets-header">
          <div>
            <h2 class="section-title" style="margin-bottom:.2rem">Pets Cadastrados</h2>
            <p class="section-sub" style="margin-bottom:0">Todos os seus cães cadastrados</p>
          </div>
          <div style="display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;">
            <input class="search-bar" id="searchPets" type="text" placeholder="🔍 Buscar por nome..." oninput="renderPets()" />
            <span class="pets-count" id="petsCount">0 pets</span>
          </div>
        </div>
        <div class="pets-grid" id="petsGrid"></div>
      </div>

    </div>

  </main>
  <script src="js/script.js"></script>
</body>
</html>
